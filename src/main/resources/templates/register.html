<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!--javascript를 jquery로 사용-->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!--스프링부트에서 제공하는 아이콘-->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!--알람창 스크립트-->
   <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="container mt-5">
    <div class="w-50 mx-auto">
        <div class="card">
            <div class="card-header bg-primary text-white"> <!--제목-->
                <h4 class="mb-0">신규 음식 등록</h4>
            </div>
            <div class="card-body">
                <form id="addForm" method="post">
                    <div><!--분류-->
                        <label class="form-lable">*분류:</label>
                        <select class="form-select" name="category">
                            <option th:each="type:${types}"
                            th:text="${type.description}" th:value="${type.name()}">한식</option> <!--카테고리 항목만큼 반복처리-->
                        </select>
                    </div>
                    <div><!--음식명-->
                        <label class="form-label">*음식명</label>
                        <input class="form-control" type="text" name="dishname">
                    </div>
                    <div><!--음식가격-->
                        <label class="form-label">*음식가격</label>
                        <input class="form-control" type="number" name="price">
                    </div>
                    <div><!--음식설명-->
                        <label class="form-label">*음식설명</label>
                        <textarea class="form-control" name="desc" rows="3"></textarea>
                    </div>
                    <div><!--작업버튼, submit 사용안하고 스크립트로 전달-->
                        <button class="btn btn-primary" id="addButton" type="button">
                            <i class="bi-file-earmark-check"></i>저장
                        </button>
                        <a class="btn btn-danger" th:href="@{/dish/list}">
                            <i class="bi-file=earmark-excel"></i>목록</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    $(document).ready(function(){
        $('#addButton').on('click', function() { //등록버튼을 클릭했을 때
            var form = $('#addForm')[0]; //id가 addForm으로 선언된 첫번째 태그를 지정
            var formData = new FormData(form); //지정된 태그의 form data값을 저장(변수를 그룹으로 저장)

            $.ajax({
                url: '/dish/register',
                method: 'post',
                data : formData,//삭제에서 개별변수 전달은 {변수: 값, 변수:값....}
                processData: false,
                contentType: false,

                success: function(data){
                    Swal.fire(data).then(()=>{
                        //location.reload();
                        location.href = '/dish/list';
                    });

                },
                error: function (xhr, status, error) {
                    Swal.fire("저장을 실패하였습니다.");
                }
            });
        });
    });
</script>
</body>
</html>
