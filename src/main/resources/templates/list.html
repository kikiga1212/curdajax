<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!--javascript를 jquery로 사용-->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!--스프링부트에서 제공하는 아이콘-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <!--알람창 스크립트-->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container mt-5">
        <div class="w-100 mx-auto">
            <div class="d-flex justify-content-between align-items-conter mt-4 mb-4"> <!--제목과 등록버튼-->
                <p class="h2 text-center">음식 목록</p>
                <a class="btn btn-primary" th:href="@{/dish/register}">등록</a>
            </div>
            <div class="table-responsive"> <!--표를 이용한 목록-->
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>번호</th>
                            <th>분류</th>
                            <th>음식명</th>
                            <th>가격</th>
                            <th>설명</th>
                            <th>등록일</th>
                            <th>작업</th>
                        </tr>
                    </thead>
                    <tbody id="dishdata">
                        <tr th:each="dish:${dishDTOS}">
                            <td th:text="${dish.pid}">1</td>
                            <td th:text="${dish.category.description}">한식</td>
                            <td th:text="${dish.dishname}">김치찌개</td>
                            <td th:text="${dish.price}">10000</td>
                            <td th:text="${dish.desc}">맛있어요</td>
                            <td th:text="${#temporals.format(dish.modDate, 'yyyy-MM-dd')}">2026-01-25</td>
                            <td><!--수정/삭제 버튼-->
                                <!--btn-edit, btn-delete 클래스를 이용해서 각 줄의 이름을 지정-->
                                <a class="btn btn-primary btn-edit" th:data-id="${dish.pid}"
                                   th:href="@{/dish/modify(pid=${dish.pid})}"><i class="bi-pencil"></i>수정</a>
                                <button class="btn btn-secondary btn-delete" th:data-id="${dish.pid}" type="button"><i class="bi-trash"></i>삭제</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!--자바스크립트 추가, inline을 반드시 포함시켜야 인식이 잘된다.-->
    <script th:inline="javascript">
        $(document).ready(function () { //브라우저에 페이지가 모두 출력되었으면
            $('.btn-delete').on('click', function(){ //목록에서 btn-delete버튼을 클릭했으면
                var pid = $(this).data('id'); //this(클릭한 태그)에 data-id의 값을 읽어서 pid에 저장

                Swal.fire({ //sweetalert를 이용한 메세지 창을 구성
                    title : "삭제하시겠습니까?",  //메시지
                    text : "데이터를 영구 삭제합니다.", //추가 설명
                    icon : "warning", //아이콘
                    confirmButtonText : "예", //확인버튼 내용
                    showCancelButton : true, //취소버튼 표시
                    cancelButtonText : "아니오" //취소버튼 내용
                }).then((result)=>{
                    if(result.isConfirmed) { //예버튼을 클릭했으면
                        //jquery에서 요청은 ajax를 이용
                        // localhost:8080/dish/remove?pid=1
                        $.ajax({
                            url: '/dish/remove', //요청명
                            method : 'GET',  //요청방식
                            data : {  //전달할 값
                                pid : pid //변수명 : 값
                            },
                            //responseEntity로 받은 결과값
                            //ok("삭제하였습니다."==>data
                            success: function (data) {  //200번으로 처리 성공시
                                Swal.fire(data).then(()=>{ //메세지에서 예버튼을 클릭하면
                                    location.reload(); //현재페이지를 다시 읽는다.
                                    //javascript를 이용해서 일부분을 삭제
                                });
                            },
                            //HttpStatus.INTERNAL_SERVER_ERROR==>stauts.body("저장을 실패하였습니다."==>error
                            error: function (xhr, status, error) { //그외
                                Swal.fire("삭제를 실패하였습니다.");
                            }
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>
